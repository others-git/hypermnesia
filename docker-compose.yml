# Base stack shared by dev and release. Not run on its own — combine with an overlay:
#   dev (build from source):  docker compose -f docker-compose.yml -f docker-compose.dev.yml ...
#   release (pull image):     docker compose -f docker-compose.yml -f docker-compose.release.yml ...
name: hypermnesia

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hypermnesia
      POSTGRES_PASSWORD: hypermnesia
      POSTGRES_DB: hypermnesia
    ports:
      - "5432:5432"
    volumes:
      - hm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypermnesia"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/others-git/hypermnesia:${HM_TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      HM_DATABASE_URL: postgresql://hypermnesia:hypermnesia@db:5432/hypermnesia
      HM_HOST: 0.0.0.0
      HM_PORT: "8765"
      HM_EMBEDDING_PROVIDER: fastembed
      HM_EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      # Replace with your own tokens before exposing this anywhere:
      HM_AUTH_TOKENS: '{"dev-token":{"principal":"dev","scopes":["default","shared","user:dev-test"]}}'
    ports:
      - "8765:8765"
    volumes:
      - hm_models:/root/.cache/fastembed
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8765), 2).close()"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot e2e test runner: `... --profile test run --rm tests`
  tests:
    image: ghcr.io/others-git/hypermnesia:${HM_TAG:-latest}
    profiles: ["test"]
    depends_on:
      server:
        condition: service_healthy
    environment:
      HM_TEST_URL: http://server:8765/mcp
      HM_TEST_TOKEN: dev-token
      HM_TEST_SCOPE: user:dev-test
    volumes:
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    command:
      - sh
      - -c
      - pip install -q pytest pytest-asyncio && python -m pytest /app/tests -v

volumes:
  hm_pgdata:
  hm_models:
